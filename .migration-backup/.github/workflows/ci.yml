name: CI

on:
  push:
    branches: [master, main, "claude/**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and test MCP servers
        run: |
          npm run build --workspace groundworkos-mcp
          npm test --workspace groundworkos-mcp

      - name: Lint, test and build frontend
        env:
          # Placeholders so prerender can construct the Supabase client at
          # build time. Real values are injected at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
        run: |
          npm run lint --workspace groundworkos
          npm test --workspace groundworkos
          npm run build --workspace groundworkos
