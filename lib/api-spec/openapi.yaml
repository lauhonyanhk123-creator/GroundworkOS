components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardStats:
      type: object
      required: [activeJobs, outstandingAmount, pendingQuotes, docAlerts, overdueInvoices, totalJobValue, revenuePaid, activeSubcons, plantCount]
      properties:
        activeJobs: { type: integer }
        outstandingAmount: { type: number }
        pendingQuotes: { type: integer }
        docAlerts: { type: integer }
        overdueInvoices: { type: integer }
        totalJobValue: { type: number }
        revenuePaid: { type: number }
        activeSubcons: { type: integer }
        plantCount: { type: integer }

    # ── CLIENT ──────────────────────────────────────────────────────────────
    ClientRecord:
      type: object
      required: [id, companyName, createdAt]
      properties:
        id: { type: string }
        companyName: { type: string }
        contactName: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        vatNumber: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        totalJobs: { type: integer }
        totalValue: { type: number }

    ClientInput:
      type: object
      required: [id, companyName]
      properties:
        id: { type: string }
        companyName: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        vatNumber: { type: string }
        notes: { type: string }

    ClientUpdate:
      type: object
      properties:
        companyName: { type: string }
        contactName: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        vatNumber: { type: string }
        notes: { type: string }

    # ── JOB ─────────────────────────────────────────────────────────────────
    JobRecord:
      type: object
      required: [id, jobNumber, title, status, progressPercent, nrswaRequired, createdAt]
      properties:
        id: { type: string }
        jobNumber: { type: string }
        title: { type: string }
        clientId: { type: ["string", "null"] }
        clientName: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        siteAddress: { type: ["string", "null"] }
        value: { type: ["number", "null"] }
        startDate: { type: ["string", "null"] }
        endDate: { type: ["string", "null"] }
        status: { type: string }
        progressPercent: { type: integer }
        description: { type: ["string", "null"] }
        foreman: { type: ["string", "null"] }
        crewCount: { type: ["integer", "null"] }
        nrswaRequired: { type: boolean }
        permitNumber: { type: ["string", "null"] }
        createdAt: { type: string }

    JobInput:
      type: object
      required: [id, jobNumber, title]
      properties:
        id: { type: string }
        jobNumber: { type: string }
        title: { type: string }
        clientId: { type: string }
        type: { type: string }
        siteAddress: { type: string }
        value: { type: number }
        startDate: { type: string }
        endDate: { type: string }
        status: { type: string }
        progressPercent: { type: integer }
        description: { type: string }
        foreman: { type: string }
        crewCount: { type: integer }
        nrswaRequired: { type: boolean }
        permitNumber: { type: string }

    JobUpdate:
      type: object
      properties:
        title: { type: string }
        clientId: { type: string }
        type: { type: string }
        siteAddress: { type: string }
        value: { type: number }
        startDate: { type: string }
        endDate: { type: string }
        status: { type: string }
        progressPercent: { type: integer }
        description: { type: string }
        foreman: { type: string }
        crewCount: { type: integer }
        nrswaRequired: { type: boolean }
        permitNumber: { type: string }

    # ── QUOTE ───────────────────────────────────────────────────────────────
    LineItemRecord:
      type: object
      required: [id, quoteId, description, quantity, unit, unitPrice, total]
      properties:
        id: { type: string }
        quoteId: { type: string }
        description: { type: string }
        quantity: { type: number }
        unit: { type: string }
        unitPrice: { type: number }
        total: { type: number }

    QuoteRecord:
      type: object
      required: [id, quoteNumber, status, subtotal, vatAmount, totalAmount, createdAt, lineItems]
      properties:
        id: { type: string }
        quoteNumber: { type: string }
        clientId: { type: ["string", "null"] }
        clientName: { type: ["string", "null"] }
        jobId: { type: ["string", "null"] }
        title: { type: ["string", "null"] }
        status: { type: string }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        validUntil: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        sentAt: { type: ["string", "null"] }
        createdAt: { type: string }
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemRecord"

    QuoteInput:
      type: object
      required: [id, quoteNumber]
      properties:
        id: { type: string }
        quoteNumber: { type: string }
        clientId: { type: string }
        jobId: { type: string }
        title: { type: string }
        status: { type: string }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        validUntil: { type: string }
        notes: { type: string }
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemRecord"

    QuoteUpdate:
      type: object
      properties:
        clientId: { type: string }
        jobId: { type: string }
        title: { type: string }
        status: { type: string }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        validUntil: { type: string }
        notes: { type: string }
        sentAt: { type: string }
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemRecord"

    # ── INVOICE ─────────────────────────────────────────────────────────────
    InvoiceRecord:
      type: object
      required: [id, invoiceNumber, status, subtotal, vatAmount, totalAmount, issuedDate, createdAt]
      properties:
        id: { type: string }
        invoiceNumber: { type: string }
        clientId: { type: ["string", "null"] }
        clientName: { type: ["string", "null"] }
        jobId: { type: ["string", "null"] }
        jobTitle: { type: ["string", "null"] }
        quoteId: { type: ["string", "null"] }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        status: { type: string }
        issuedDate: { type: string }
        dueDate: { type: ["string", "null"] }
        paidAt: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        cisDeduction: { type: ["number", "null"] }
        createdAt: { type: string }

    InvoiceInput:
      type: object
      required: [id, invoiceNumber, issuedDate]
      properties:
        id: { type: string }
        invoiceNumber: { type: string }
        clientId: { type: string }
        jobId: { type: string }
        quoteId: { type: string }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        status: { type: string }
        issuedDate: { type: string }
        dueDate: { type: string }
        notes: { type: string }
        cisDeduction: { type: number }

    InvoiceUpdate:
      type: object
      properties:
        clientId: { type: string }
        jobId: { type: string }
        status: { type: string }
        subtotal: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        issuedDate: { type: string }
        dueDate: { type: string }
        paidAt: { type: string }
