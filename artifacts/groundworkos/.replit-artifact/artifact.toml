kind = "web"
previewPath = "/"
title = "GroundworkOS"
version = "1.0.0"
id = "artifacts/groundworkos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25421

[services.development]
run = "pnpm --filter @workspace/groundworkos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groundworkos", "run", "build" ]
publicDir = "artifacts/groundworkos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25421"
BASE_PATH = "/"
