events {
    worker_connections 1024;
}

http {
    # ── HTTP: redirect to HTTPS + serve ACME challenges ───────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS reverse proxy ────────────────────────────────────────────────────
    # Replace YOUR_DOMAIN with your actual domain (e.g. app.groundworkos.co.uk)
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/nginx/ssl/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (ported from vercel.json)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Proxy to Next.js container
        location / {
            proxy_pass         http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Streaming AI responses (SSE / chunked)
            proxy_buffering    off;
            proxy_read_timeout 120s;
        }
    }
}
